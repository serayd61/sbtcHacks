[project]
name = "sbtcHacks"
description = "sBTC Covered Call Options Vault - BUIDL BATTLE #2"
authors = []
telemetry = true
cache_dir = "./.cache"

[contracts.sip-010-trait]
path = "contracts/sip-010-trait.clar"
clarity_version = 2
epoch = "2.5"

[contracts.mock-sbtc]
path = "contracts/mock-sbtc.clar"
clarity_version = 2
epoch = "2.5"
depends_on = ["sip-010-trait"]

[contracts.price-oracle]
path = "contracts/price-oracle.clar"
clarity_version = 2
epoch = "2.5"

[contracts.sbtc-options-vault]
path = "contracts/sbtc-options-vault.clar"
clarity_version = 2
epoch = "2.5"
depends_on = ["sip-010-trait", "mock-sbtc"]

[contracts.options-market]
path = "contracts/options-market.clar"
clarity_version = 2
epoch = "2.5"
depends_on = ["sip-010-trait", "mock-sbtc", "sbtc-options-vault"]

# V2 Contracts (Phase 1 - Security Hardening)
[contracts.vault-data-v1]
path = "contracts/vault-data-v1.clar"
clarity_version = 2
epoch = "2.5"

[contracts.vault-logic-v2]
path = "contracts/vault-logic-v2.clar"
clarity_version = 2
epoch = "2.5"
depends_on = ["sip-010-trait", "mock-sbtc", "vault-data-v1"]

[contracts.options-market-v2]
path = "contracts/options-market-v2.clar"
clarity_version = 2
epoch = "2.5"
depends_on = ["sip-010-trait", "mock-sbtc", "vault-logic-v2"]

[contracts.admin-multisig]
path = "contracts/admin-multisig.clar"
clarity_version = 2
epoch = "2.5"

[repl.analysis]
passes = ["check_checker"]
check_checker = { trusted_sender = false, trusted_caller = false, callee_filter = false }
