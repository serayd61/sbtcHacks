name: CI — Tests & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────
  # Clarity Contract Tests (Clarinet)
  # ──────────────────────────────────
  clarity-tests:
    name: Clarity Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Clarinet tests
        run: npm test

  # ──────────────────────────────────
  # Clarity Contract Validation
  # ──────────────────────────────────
  clarity-check:
    name: Clarity Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Clarinet
        run: |
          curl -L https://github.com/stx-labs/clarinet/releases/latest/download/clarinet-linux-x64-glibc.tar.gz | tar xz
          sudo mv clarinet /usr/local/bin/

      - name: Validate contracts
        run: clarinet check

  # ──────────────────────────────────
  # Frontend Build Check
  # ──────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_STACKS_NETWORK: mainnet

  # ──────────────────────────────────
  # SDK Build & Type Check
  # ──────────────────────────────────
  sdk-build:
    name: SDK Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build SDK
        run: npm run build

  # ──────────────────────────────────
  # Security Audit
  # ──────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit root dependencies
        run: npm audit --audit-level=high || true

      - name: Audit frontend dependencies
        run: cd frontend && npm audit --audit-level=high || true

  # ──────────────────────────────────
  # Contract & Test Metrics
  # ──────────────────────────────────
  contract-metrics:
    name: Contract Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Report metrics
        run: |
          echo "## Contract Metrics" >> $GITHUB_STEP_SUMMARY
          echo "- **Total contracts:** $(ls contracts/*.clar | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Clarity lines:** $(cat contracts/*.clar | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- **Total test files:** $(ls tests/*.test.ts | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- **Total test lines:** $(cat tests/*.test.ts | wc -l)" >> $GITHUB_STEP_SUMMARY
