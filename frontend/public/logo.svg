<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="url(#orange)" stroke-width="4"/>

  <!-- Vault door outline (outer ring) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#f9731640" stroke-width="3"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#f9731625" stroke-width="1.5"/>

  <!-- Vault door lines (like a safe) -->
  <line x1="256" y1="76" x2="256" y2="116" stroke="#f9731660" stroke-width="2" stroke-linecap="round"/>
  <line x1="256" y1="396" x2="256" y2="436" stroke="#f9731660" stroke-width="2" stroke-linecap="round"/>
  <line x1="76" y1="256" x2="116" y2="256" stroke="#f9731660" stroke-width="2" stroke-linecap="round"/>
  <line x1="396" y1="256" x2="436" y2="256" stroke="#f9731660" stroke-width="2" stroke-linecap="round"/>

  <!-- Diagonal vault lines -->
  <line x1="128" y1="128" x2="152" y2="152" stroke="#f9731640" stroke-width="2" stroke-linecap="round"/>
  <line x1="384" y1="128" x2="360" y2="152" stroke="#f9731640" stroke-width="2" stroke-linecap="round"/>
  <line x1="128" y1="384" x2="152" y2="360" stroke="#f9731640" stroke-width="2" stroke-linecap="round"/>
  <line x1="384" y1="384" x2="360" y2="360" stroke="#f9731640" stroke-width="2" stroke-linecap="round"/>

  <!-- Bitcoin "B" symbol - centered -->
  <g transform="translate(256, 220)">
    <!-- Vertical bars of B -->
    <rect x="-28" y="-55" width="8" height="110" rx="4" fill="url(#orange)"/>

    <!-- Top serif -->
    <rect x="-32" y="-60" width="16" height="6" rx="3" fill="url(#orange)"/>
    <!-- Bottom serif -->
    <rect x="-32" y="50" width="16" height="6" rx="3" fill="url(#orange)"/>

    <!-- B curves -->
    <path d="M-20,-50 H10 C35,-50 35,-15 10,-15 H-20" fill="none" stroke="url(#orange)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-20,-15 H15 C42,-15 42,22 15,22 H-20" fill="none" stroke="url(#orange)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Upward arrow (yield/growth) integrated into design -->
  <g transform="translate(256, 150)">
    <polygon points="0,-25 15,-5 8,-5 8,10 -8,10 -8,-5 -15,-5" fill="url(#gold)" opacity="0.9"/>
  </g>

  <!-- "OPTIONS VAULT" text arc at bottom -->
  <text x="256" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" letter-spacing="6" fill="#f97316">OPTIONS VAULT</text>

  <!-- Small sBTC label -->
  <text x="256" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" letter-spacing="3" fill="#fbbf24" opacity="0.8">sBTC</text>
</svg>
