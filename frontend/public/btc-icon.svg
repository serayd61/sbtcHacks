<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <rect x="2" y="2" width="252" height="252" rx="54" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.5"/>

  <!-- Bitcoin B -->
  <g transform="translate(128, 118)">
    <rect x="-24" y="-45" width="7" height="90" rx="3.5" fill="url(#accent)"/>
    <rect x="-28" y="-49" width="14" height="5" rx="2.5" fill="url(#accent)"/>
    <rect x="-28" y="42" width="14" height="5" rx="2.5" fill="url(#accent)"/>
    <path d="M-17,-41 H8 C28,-41 28,-12 8,-12 H-17" fill="none" stroke="url(#accent)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-17,-12 H12 C34,-12 34,18 12,18 H-17" fill="none" stroke="url(#accent)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Yield arrow -->
  <g transform="translate(128, 58)">
    <polygon points="0,-18 12,-3 6,-3 6,6 -6,6 -6,-3 -12,-3" fill="#fbbf24" opacity="0.85"/>
  </g>

  <!-- Vault arc -->
  <path d="M 78 200 A 80 80 0 0 0 178 200" fill="none" stroke="#f97316" stroke-width="2" opacity="0.4"/>

  <text x="128" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="#f97316" opacity="0.9">VAULT</text>
</svg>
